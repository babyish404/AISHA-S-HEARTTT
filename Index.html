<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aisha's Heart ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{

background:linear-gradient(180deg,#4d0000,#8b0000,#b30000);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:white;

}

.page{

position:absolute;

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

transition:.8s;

}

.hidden{

opacity:0;

pointer-events:none;

}

h1{

font-size:55px;

margin-bottom:20px;

}

p{

font-size:22px;

margin-bottom:30px;

text-align:center;

padding:20px;

}

button{

padding:18px 45px;

font-size:20px;

border:none;

border-radius:40px;

background:white;

color:#8b0000;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

.envelope{

font-size:150px;

cursor:pointer;

animation:float 2s infinite;

}

@keyframes float{

0%{transform:translateY(0);}

50%{transform:translateY(-15px);}

100%{transform:translateY(0);}

}

.small{

font-size:24px;

margin-top:20px;

}

</style>

</head>

<body>

<!-- PAGE 1 -->

<div id="page1" class="page">

<h1>Hello Saleem ❤️</h1>

<p>Welcome to Aisha's Heart.</p>

<button onclick="nextPage()">Enter</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page hidden">

<div class="envelope" onclick="openLetter()">

💌

</div>

<p class="small">

Click the envelope to open it...

</p>

</div>

<script>

function nextPage(){

document.getElementById("page1").classList.add("hidden");

document.getElementById("page2").classList.remove("hidden");

}

function openLetter(){

alert("The letter opens here ❤️");

}

</script>

</body>

</html>
